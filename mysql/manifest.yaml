apiVersion: apps/v1
kind: Deployment

metadata:
  name: mysql
labels:
  project: roboshop
  environment: dev
  tier: db
  component: mysql

spec:
  replicas: 1

  selector:
    matchLabels:
    project: roboshop
    environment: dev
    tier: db
    component: mysql
  template:
    metadata:
      labels:
        project: roboshop
        environment: dev
        tier: db
        component: mysql
    spec:
      containers:
      - name: mysql
        image: jayashankar1994/mysql:1.4.0
---
apiVersion: v1
kind: service

metadata:
  name: mysql
  labels:
    project: roboshop
    environment: dev
    tier: db
    component: mysql
  spec:
    selector:
      project: roboshop
      environment: dev
      tier: db
      component: mysql
    
    ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306
