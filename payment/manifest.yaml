apiVersion: v1
kind: ConfigMap

metadata:
  name: payment
  namespace: roboshop
  labels:
    project: roboshop
    environment: dev
    tier: backend
    component: payment

data:
  CART_HOST: "cart"
  CART_PORT: "8080"
  USER_HOST: "user"
  USER_PORT: "8080"
  AMQP_HOST: "rabbitmq"
  AMQP_USER: "roboshop"
  AMQP_PASS: "roboshop123"

---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: payment
  namespace: roboshop
  labels:
    project: roboshop
    environment: dev
    tier: backend
    component: payment

spec:
  replicas: 1

  selector:
    matchLabels:
      project: roboshop
      environment: dev
      tier: backend
      component: payment

  template:
    metadata:
      labels:
        project: roboshop
        environment: dev
        tier: backend
        component: payment
    
    spec:
      containers:
      - name: payment
        image: jayashankar1994/payment:1.4.0
        imagePullPolicy: Always   # Kubernetes always checks the registry and pulls the image.
        resources:
          requests:
            cpu: "68m"
            memory: "100Mi"
          limits:
            cpu: "68m"
            memory: "100Mi"
        readinessProbe:
          # httpGet:
          #   path: /health
          #   port: 8080
          tcpSocket:
            port: 8080
          failureThreshold: 2
          periodSeconds: 10
          initialDelaySeconds: 15
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          failureThreshold: 2
          periodSeconds: 10
        envFrom:
          - configMapRef:
              name: payment

---
apiVersion: v1
kind: Service

metadata:
  name: payment
  namespace: roboshop
  labels:
    project: roboshop
    environment: dev
    tier: backend
    component: payment

spec:
  selector:
    project: roboshop
    environment: dev
    tier: backend
    component: payment

  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080