apiVersion: apps/v1
kind: Deployment

metadata:
  name: mongodb
  NameSpace: roboshop
  labels:
    project: roboshop
    environment: dev
    tier: db
    component: mongodb

spec:
  replicas: 1
  selector:
    matchLabels: 
      project: roboshop
      environment: dev
      tier: db
      component: mongodb
  template:
    metadata:
      labels:
        project: roboshop
        environment: dev
        tier: db
        component: mongodb
    spec:
      containers:
      - name: mongodb
        image: jayashankar1994/mongodb:1.0.0 
--------
-------

apiVersion: v1
kind: Service

metadata:
  name: mongodb
  NameSpace : roboshop
  labels:
    project: roboshop
    environment: dev
    tier: db
    component: mongodb
spec:
  selector:
    project: roboshop
    environment: dev
    tier: db
    component: mongodb
  ports:
  - protocol: TCP
    port: 27017  # service port
    targetPort: 27017 # container port

