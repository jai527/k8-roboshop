apiVersion: v1
kind: ConfigMap

metadata:
  name: user
  namespace: roboshop
  labels:
    project: roboshop
    environment: dev
    tier: backend
    component: user

data:
  MONGO: "true"
  MONGO_URL: "mongodb://mongodb:27017/user"
  REDIS_URL: 'redis:redis:6379'

---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: user
  namespace: roboshop
  labels:
    project: roboshop
    environment: dev
    tier: backend
    component: user

spec:
  replicas: 1

  selector:
    matchLabels:
      project: roboshop
      environment: dev
      tier: backend
      component: user

  template:
    metadata:
      labels:
        project: roboshop
        environment: dev
        tier: backend
        component: user
    
    spec:
      containers:
      - name: user
        image: jayashankar1994/user:1.0.0
        imagePullPolicy: Always   # Kubernetes always checks the registry and pulls the image.
        resources:
          requests:
            cpu: "68m"
            memory: "100Mi"
          limits:
            cpu: "68m"
            memory: "100Mi"
        readinessProbe:
          # httpGet:
          #   path: /health
          #   port: 8080
          tcpSocket:
            port: 8080
          failureThreshold: 2
          periodSeconds: 10
          initialDelaySeconds: 15
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          failureThreshold: 2
          periodSeconds: 10
        envFrom:
          - configMapRef:
              name: user

---
apiVersion: v1
kind: Service

metadata:
  name: user
  namespace: roboshop
  labels:
    project: roboshop
    environment: dev
    tier: backend
    component: user

spec:
  selector:
    project: roboshop
    environment: dev
    tier: backend
    component: user

  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080