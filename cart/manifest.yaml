apiVersion: v1
kind: ConfigMap

metadata:
  name: cart
  namespace: roboshop
  labels:
    project: roboshop
    environment: dev
    tier: backend
    component: cart

data:
  REDIS_HOST: "redis"
  CATALOGUE_HOST: "catalogue"

---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: cart
  namespace: roboshop
  labels:
    project: roboshop
    environment: dev
    tier: backend
    component: cart

spec:
  replicas: 1

  selector:
    matchLabels:
      project: roboshop
      environment: dev
      tier: backend
      component: cart

  template:
    metadata:
      labels:
        project: roboshop
        environment: dev
        tier: backend
        component: cart

    spec:
      containers:
      - name: cart
        image: jayashankar1994/cart:1.0.0
        imagePullPolicy: Always

        resources:
          requests:
            cpu: "68m"
            memory: "100Mi"
          limits:
            cpu: "68m"
            memory: "100Mi"

        readinessProbe:
          tcpSocket:
            port: 8080
          failureThreshold: 2
          periodSeconds: 10
          initialDelaySeconds: 15

        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          failureThreshold: 2
          periodSeconds: 10

        envFrom:
        - configMapRef:
            name: cart

---
apiVersion: v1
kind: Service

metadata:
  name: cart
  namespace: roboshop
  labels:
    project: roboshop
    environment: dev
    tier: backend
    component: cart

spec:
  selector:
    project: roboshop
    environment: dev
    tier: backend
    component: cart

  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080