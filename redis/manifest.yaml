apiVersion: apps/v1
kind: Deployment

metadata:
  name: redis
  namespace: roboshop
  labels:
    project: roboshop
    environment: dev
    tier: db
    component: redis

spec:
  replicas: 1

  selector:
    matchLabels:
      project: roboshop
      environment: dev
      tier: db
      component: redis

  template:
    metadata:
      labels:
        project: roboshop
        environment: dev
        tier: db
        component: redis

    spec:
      containers:
      - name: redis
        image: redis:7.0

---
apiVersion: v1
kind: Service

metadata:
  name: redis
  namespace: roboshop
  labels:
    project: roboshop
    environment: dev
    tier: db
    component: redis

spec:
  selector:
    project: roboshop
    environment: dev
    tier: db
    component: redis

  ports:
  - protocol: TCP
    port: 6379  # service port
    targetPort: 6379 # container port